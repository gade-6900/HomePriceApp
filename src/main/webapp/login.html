<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Admin Portal</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background-color: #f8f9fa;
	height: 100vh;
	display: flex;
	align-items: center;
}

.card {
	border: none;
	border-radius: 12px;
}

.btn-primary {
	padding: 10px;
	font-weight: 600;
	transition: transform 0.2s;
}

.btn-primary:hover {
	transform: translateY(-1px);
}
</style>
</head>

<body>

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-11 col-sm-8 col-md-6 col-lg-4">

				<div class="card p-4 shadow-lg">
					<div class="text-center mb-4">
						<h3 class="fw-bold text-primary">Welcome Back</h3>
						<p class="text-muted small">Please enter your credentials to
							login</p>
					</div>

					<form name="frm" action="validateAdmin" method="POST">

						<div class="mb-3">
							<label for="username" class="form-label small fw-bold">Username</label>
							<input type="text" id="username" name="username" placeholder=" "
								class="form-control form-control-lg" required>
						</div>

						<div class="mb-4">
							<label for="password" class="form-label small fw-bold">Password</label>
							<input type="password" id="password" name="password"
								placeholder=" " class="form-control form-control-lg" required>
						</div>

						<div class="d-grid gap-2">
							<button type="submit" class="btn btn-primary shadow-sm">Login
								to Dashboard</button>
						</div>

						<div class="text-center mt-3">
							<a href="#" class="text-decoration-none small text-muted">Forgot
								password?</a>
						</div>
					</form>
				</div>

				<p class="text-center mt-4 text-muted small">&copy; 2026 Your
					Company Inc.</p>

			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

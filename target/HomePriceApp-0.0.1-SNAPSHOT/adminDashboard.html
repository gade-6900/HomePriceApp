    <script>
function fetchCities() {
    var sid = document.getElementById('state').value;

    if (sid == '') {
        document.getElementById('cityResult').innerHTML = '';
        return;
    }

    var xhttp = new XMLHttpRequest();

    xhttp.onreadystatechange = function () {
        if (this.readyState == 4 && this.status == 200) {
            document.getElementById('cityResult').innerHTML = this.responseText;
        }
    };

    xhttp.open("GET", "viewCity?stateId=" + sid, true);
    xhttp.send();
}
</script>
